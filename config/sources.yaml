# config/sources.yaml — スクレイピング対象の定義（§8 ハード制約）
#
# 安全既定: このファイルが空（sources が無い）なら、スクレイパは何も取得しない。
# 対象サイトは運用者が明示的に記入する。Claude はここに具体サイトを書かない。
#
# 各ソースの利用規約・robots.txt・著作権・関連法の遵守は運用者責任（§8）。
# 生データは内部保存のみ。再配布・再公開しない。公開するのは派生集計だけ。
#
# 記入例（コメントアウト。実サイトは運用者が記入すること）:
#
# housing:
#   - id: example_housing      # アダプタ名（scrapers/housing/<id>.py に対応）
#     enabled: false
#     base_url: "https://example.com"
#     rate_limit_seconds: 5    # 1 req / N 秒（§8）
#     max_concurrency: 1       # 同時実行 1（§8）
#     respect_robots: true     # robots.txt 尊重（必須）
#     start_paths: []          # 取得起点
#
# food:
#   - id: example_food
#     enabled: false
#     base_url: "https://example.com"
#     rate_limit_seconds: 5
#     max_concurrency: 1
#     respect_robots: true
#     start_paths: []
#
# CSV 取り込み（スクレイピング無し。公式統計 e-Stat 等や手動パネル）の記入例:
#   type: csv を指定し、path（CSV パス）と column_map（CSV列名 -> raw フィールド名）を書く。
#   利用規約・著作権・関連法の遵守は運用者責任（§8）。生データは再配布しない。
#
# food:
#   - id: estat_food
#     enabled: true
#     type: csv
#     path: "data/estat_food.csv"
#     column_map:                # CSV 列名: raw フィールド名
#       商品ID: item_id
#       中分類: category
#       商品名: product_name
#       メーカー: brand
#       単位: unit
#       内容量: unit_size
#       価格: price
#       特売: is_promo
#       在庫: in_stock
#
# housing:
#   - id: manual_housing
#     enabled: true
#     type: csv
#     path: "data/housing_panel.csv"
#     column_map:
#       物件ID: listing_id
#       区: ward
#       住所: address_norm
#       駅: station
#       徒歩分: walk_min
#       家賃: rent_total
#       管理費: mgmt_fee
#       面積: area_m2
#       間取り: madori
#       築年: build_year
#       階: floor
#       構造: structure
#       敷金: deposit
#       礼金: key_money

housing: []
food:
  # day-0 スモークテスト用ソース（ライフのスクショ抽出 18 品目・全品特売の一回限りスナップショット）。
  # 実速報ではない。後で除去/差替する前提。
  - id: life_panel
    enabled: true
    type: csv
    path: data/life_panel.csv
    column_map:
      商品ID: item_id
      分類: category
      品名: product_name
      ブランド: brand
      単位: unit
      内容量: unit_size
      価格: price
      特売: is_promo

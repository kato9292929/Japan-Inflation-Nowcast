# config/baskets.yaml — 代表バスケット・中分類・CPI ウェイト・基準期（§5, §6）
#
# 出典: 総務省 消費者物価指数（CPI）基準年のウェイト。
# 注意: これは「公式 CPI」ではなくナウキャストの加重に用いる参照ウェイト（§0 非交渉制約）。
# リベース時は methodology_versions に version を起こして更新する。

base_date: "2025-01-01"        # 指数の基準期（.env の BASE_DATE と整合させる）
weights_source: "MIC CPI (placeholder weights — 運用者が基準年ウェイトに更新する)"

# --- 合成ウェイト（CPI 10000 分比のうち食料・住居）---
# coverage_pct = (food + housing) / 10000 * 100
# 下記は枠組みを示すプレースホルダ。運用者が基準年の実値に更新する。
composite_weights:
  JP-INFL-FOOD: 2626      # CPI 10000 分比のうち「食料」（プレースホルダ）
  JP-INFL-HOUSING: 2087   # CPI 10000 分比のうち「住居」（プレースホルダ）
  # coverage = (2626 + 2087) / 10000 = 47.13%

# --- 食料 中分類（CPI 食料の内訳）と上位集計ウェイト（§6-2）---
# elementary（Jevons）→ 中分類 → これらウェイトでラスパイレス加重。
food:
  default_promo_mode: incl_promo   # スモークテスト一時設定（全品特売のため）。後で excl_promo に戻す
  categories:
    # name はそのまま food_raw.category にマップする CPI 食料中分類。
    # weight は中分類間のラスパイレス加重（合計は内部で正規化）。
    - { name: "穀類",       weight: 1 }
    - { name: "魚介類",     weight: 1 }
    - { name: "肉類",       weight: 1 }
    - { name: "乳卵類",     weight: 1 }
    - { name: "野菜・海藻", weight: 1 }
    - { name: "果物",       weight: 1 }
    - { name: "油脂・調味料", weight: 1 }
    - { name: "菓子類",     weight: 1 }
    - { name: "調理食品",   weight: 1 }
    - { name: "飲料",       weight: 1 }
    - { name: "豆腐・大豆製品", weight: 1 }   # スモークテスト用 暫定（後で総務省CPIウェイトに差替）

# --- 住居 代表バスケット（§6-1）---
# 回転ヘドニックで予測する代表ユニット群（ward × madori 固定スペック）と
# ストック構成ウェイト。クロスチェックの層もここで定義する。
housing:
  rolling_window_days: 28        # ローリング窓（§6-1）
  # age_band / walk_band の境界（特徴量バンド化に使用）。
  age_bands: [5, 10, 20, 30]     # 築年バンド境界（年）
  walk_bands: [5, 10, 15]        # 徒歩バンド境界（分）
  # ¥/m^2 異常値の winsorize 閾値（ETL normalize_listing。無ければ既定 1000/50000）。
  winsor_rent_per_m2:
    min: 1000
    max: 50000
  # 代表ユニット: 予測対象の固定スペック + ストックウェイト。
  # 下記はプレースホルダ。運用者が対象エリアのストック構成に更新する。
  representative_units:
    - { ward: "placeholder", madori: "1K",  area_m2: 25.0, age_band: 1, walk_band: 0, structure: "RC", floor: 3, weight: 1 }
    - { ward: "placeholder", madori: "1LDK", area_m2: 40.0, age_band: 1, walk_band: 1, structure: "RC", floor: 3, weight: 1 }
    - { ward: "placeholder", madori: "2LDK", area_m2: 55.0, age_band: 2, walk_band: 1, structure: "RC", floor: 4, weight: 1 }
